<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0c;
    color: #e4e4e7;
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;

  }
  .ambient-1 { position: fixed; top: -200px; right: -200px; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%); pointer-events: none; }
  .ambient-2 { position: fixed; bottom: -300px; left: -200px; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(14,165,233,0.04) 0%, transparent 70%); pointer-events: none; }

  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; justify-content: space-between; align-items: center;
    position: relative; z-index: 2;
  }
  .logo-row { display: flex; align-items: center; gap: 10px; }
  .status-dot {

  .version-badge {

    padding: 2px 8px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.08);

  .logo-sub { margin: 4px 0 0 20px; font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1px; }

  main { max-width: 720px; margin: 0 auto; padding: 24px 24px 80px; position: relative; z-index: 2; }

  .tabs {
    display: flex; margin-bottom: 24px; border-radius: 8px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .tab-btn {
    flex: 1; padding: 12px 16px; border: none; cursor: pointer;

  .btn-row { display: flex; gap: 10px; margin-top: 16px; }

  .btn-analyze {

  .btn-analyze:disabled {
    background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.15);
    box-shadow: none; cursor: not-allowed;
  }
  .btn-analyze:not(:disabled):hover { filter: brightness(1.1); }

  .btn-clear, .btn-secondary {
    padding: 14px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
    background: transparent; color: rgba(255,255,255,0.3);
    font-size: 11px; font-weight: 700; letter-spacing: 2px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; transition: all 0.2s;
  }
  .btn-clear:hover, .btn-secondary:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); }

  .howto {
    margin-top: 20px; padding: 18px 24px; border-radius: 10px;
    background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.04);
    font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.8;
  }
  .howto strong { color: rgba(255,255,255,0.5); font-weight: 700; }

  /* Report styles */
  .report-section { display: flex; flex-direction: column; gap: 20px; }

  .score-card { text-align: center; padding: 28px; }
  .score-label { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.2); margin-bottom: 16px; }
  .score-time { margin-top: 16px; font-size: 11px; color: rgba(255,255,255,0.2); }

  .gauge-ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 8; }
  .gauge-ring {
    fill: none; stroke-width: 8; stroke-linecap: round;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .gauge-score { text-anchor: middle; font-size: 32px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .gauge-max { text-anchor: middle; fill: rgba(255,255,255,0.35); font-size: 10px; font-family: 'JetBrains Mono', monospace; }

  .risk-badge {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 2px;
    padding: 4px 14px; border-radius: 4px; margin-top: 8px;
  }

  .auth-row { display: flex; gap: 10px; }
  .auth-badge {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 14px 20px; border-radius: 8px; flex: 1; min-width: 90;
  }
  .auth-badge .proto { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,0.35); }
  .auth-badge .status { font-size: 14px; font-weight: 700; text-transform: uppercase; }

  .data-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .data-row:last-child { border-bottom: none; }
  .data-label { font-size: 12px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; min-width: 140px; }
  .data-value { font-size: 13px; color: rgba(255,255,255,0.85); text-align: right; word-break: break-all; max-width: 60%; }
  .data-value.mono { font-family: 'JetBrains Mono', monospace; }
  .data-value.warn { color: #f59e0b; }

  .finding-row { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; }
  .finding-icon { font-size: 14px; font-weight: 700; flex-shrink: 0; width: 18px; text-align: center; }
  .finding-text { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; }
  .finding-icon.pass { color: #22c55e; }
  .finding-icon.warn { color: #f59e0b; }
  .finding-icon.fail { color: #ef4444; }

  .footer-brand {
    text-align: center; padding: 20px 0 0; border-top: 1px solid rgba(255,255,255,0.04);
    font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 1px;
  }

  .action-row { display: flex; gap: 10px; }
  .action-row .btn-secondary { flex: 1; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.35s ease; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  @media (max-width: 600px) {
    header { flex-direction: column; align-items: flex-start; gap: 10px; padding: 20px 16px 16px; }
    .header-brand { text-align: left; }
    main { padding: 16px 16px 60px; }
    .auth-row { flex-direction: column; }
    .data-row { flex-direction: column; align-items: flex-start; gap: 4px; }
    .data-value { text-align: left; max-width: 100%; }
  }
</style>

<body>

<div class="ambient-1"></div>
<div class="ambient-2"></div>

<header>
  <div>
    <div class="logo-row">
      <div class="status-dot" id="statusDot"></div>
      <span class="logo-text">SENTRY4E</span>
      <span class="version-badge">v1.0</span>
    </div>
    <p class="logo-sub">EMAIL HEADER INTELLIGENCE</p>
  </div>
  <div class="header-brand">
    <div>mrtechnyc.com</div>
    <div>FREE SECURITY TOOL</div>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" id="tabInput" onclick="showTab('input')">HEADER INPUT</button>
    <button class="tab-btn" id="tabReport" onclick="showTab('report')" disabled>SENTRY REPORT</button>
  </div>

  <!-- INPUT VIEW -->
  <div id="viewInput" class="fade-in">
    <div class="card">
      <div class="input-header">
        <div class="card-label">PASTE RAW EMAIL HEADERS</div>
        <button class="btn-sample" onclick="loadSample()">LOAD SAMPLE</button>
      </div>
      <textarea id="headerInput" placeholder="Delivered-To: user@example.com&#10;Received: from mail.example.com ...&#10;Authentication-Results: ...&#10;From: &quot;Sender Name&quot; <sender@domain.com>"></textarea>
      <div class="btn-row">
        <button class="btn-analyze" id="btnAnalyze" onclick="runAnalysis()" disabled>▶ ANALYZE HEADERS</button>
        <button class="btn-clear" id="btnClear" onclick="resetAll()" style="display:none">CLEAR</button>
      </div>
    </div>
    <div class="howto">
      <strong>HOW TO GET HEADERS:</strong><br>
      Gmail → Open email → ⋮ → "Show original"<br>
      Outlook → Open email → ⋮ → "View message source"<br>
      Apple Mail → View → Message → All Headers
    </div>
  </div>

  <!-- REPORT VIEW -->
  <div id="viewReport" style="display:none" class="fade-in">
    <div class="report-section" id="reportContent"></div>
  </div>
</main>

<script>
const SAMPLE_HEADER = `Delivered-To: user@example.com
Received: by 2002:a05:7300:478a:b0:12a:5f3e:8c1d with SMTP id r10csp1234567dyk;
        Tue, 18 Mar 2025 09:23:45 -0700 (PDT)
X-Google-DKIM-Signature: v=1; a=rsa-sha256; c=relaxed/relaxed;
        d=1e100.net; s=20230601; t=1710774225;
Return-Path: <bounce@marketing.suspicious-domain.xyz>
Received: from mail-sor-f41.google.com (mail-sor-f41.google.com. [209.85.220.41])
        by mx.google.com with SMTPS id a1234b5678
Received-SPF: softfail (google.com: domain of info@suspicious-domain.xyz does not designate 45.33.32.156 as permitted sender) client-ip=45.33.32.156;
Authentication-Results: mx.google.com;
       dkim=fail header.i=@suspicious-domain.xyz header.s=selector1 header.b=abc123;
       spf=softfail (google.com: domain of info@suspicious-domain.xyz does not designate 45.33.32.156 as permitted sender) smtp.mailfrom=info@suspicious-domain.xyz;
       dmarc=fail (p=NONE sp=NONE dis=NONE) header.from=suspicious-domain.xyz
From: "Account Security Team" <info@suspicious-domain.xyz>
To: user@example.com
Subject: Urgent: Verify Your Account Immediately
Date: Tue, 18 Mar 2025 12:23:41 -0400
Message-ID: <random123@suspicious-domain.xyz>
MIME-Version: 1.0
X-Mailer: PHPMailer 6.1.4
X-Originating-IP: [45.33.32.156]
Content-Type: multipart/alternative; boundary="boundary123"`;

const input = document.getElementById('headerInput');
const btnAnalyze = document.getElementById('btnAnalyze');
const btnClear = document.getElementById('btnClear');

input.addEventListener('input', () => {
  const hasText = input.value.trim().length > 0;
  btnAnalyze.disabled = !hasText;
  btnClear.style.display = hasText ? 'block' : 'none';
});

function showTab(tab) {
  document.getElementById('tabInput').classList.toggle('active', tab === 'input');
  document.getElementById('tabReport').classList.toggle('active', tab === 'report');
  document.getElementById('viewInput').style.display = tab === 'input' ? 'block' : 'none';
  document.getElementById('viewReport').style.display = tab === 'report' ? 'block' : 'none';
}

function loadSample() {
  input.value = SAMPLE_HEADER;
  input.dispatchEvent(new Event('input'));
}

function resetAll() {
  input.value = '';
  input.dispatchEvent(new Event('input'));
  document.getElementById('tabReport').disabled = true;
  showTab('input');
}

// ── Parser ──
function parseHeaders(raw) {
  const lines = raw.split("\\n");
  const h = {};
  let cur = "";
  for (const line of lines) {
    if (/^\\s/.test(line) && cur) { h[cur] += " " + line.trim(); }
    else {
      const m = line.match(/^([A-Za-z0-9-]+):\\s*(.*)/);
      if (m) { cur = m[1].toLowerCase(); h[cur] = (h[cur] ? h[cur] + " | " : "") + m[2].trim(); }
    }
  }
  return h;
}

function extractOriginIP(raw, h) {
  const xo = h["x-originating-ip"];
  if (xo) { const m = xo.match(/\\[?([\\d.]+)\\]?/); if (m) return m[1]; }
  const ci = raw.match(/client-ip=([\\d.]+)/);
  if (ci) return ci[1];
  const rc = raw.match(/Received:\\s*from\\s+\\S+\\s+\\(\\S+\\.\\s*\\[([\\d.]+)\\]\\)/i);
  if (rc) return rc[1];
  const any = raw.match(/\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b/);
  return any ? any[0] : "Not Found";
}

function extractSenderName(h) {
  const f = h["from"] || "";
  const nm = f.match(/"([^"]+)"/); if (nm) return nm[1];
  const an = f.match(/^([^<]+)</); if (an) return an[1].trim();
  return f || "Not Found";
}

function extractFromDomain(h) {
  const f = h["from"] || "";
  const m = f.match(/@([\\w.-]+)/);
  return m ? m[1] : "Not Found";
}

function extractFromEmail(h) {
  const f = h["from"] || "";
  const m = f.match(/<([^>]+)>/); if (m) return m[1];
  const b = f.match(/[\\w.-]+@[\\w.-]+/);
  return b ? b[0] : "Not Found";
}

function extractReturnPath(h) {
  const rp = h["return-path"] || "";
  const m = rp.match(/<([^>]+)>/);
  return m ? m[1] : rp || "Not Found";
}

function extractSubject(h) { return h["subject"] || "Not Found"; }
function extractMailer(h) { return h["x-mailer"] || h["user-agent"] || "Not Detected"; }

function checkAuth(raw, type) {
  const m = raw.match(new RegExp(type + "=(\\\\w+)", "i"));
  if (m) return m[1].toLowerCase();
  if (type === "spf") { const r = raw.match(/Received-SPF:\\s*(\\w+)/i); if (r) return r[1].toLowerCase(); }
  return "none";
}

function computeScore(spf, dkim, dmarc, returnPath, fromEmail, fromDomain) {
  let score = 10;
  const findings = [];

  if (spf === "pass") findings.push({ t: "SPF passed", c: "pass" });
  else if (spf === "softfail") { score -= 2; findings.push({ t: "SPF softfail — sender IP not fully authorized", c: "warn" }); }
  else if (spf === "fail") { score -= 3; findings.push({ t: "SPF failed — sender IP is not authorized", c: "fail" }); }
  else { score -= 2; findings.push({ t: "SPF not configured", c: "warn" }); }

  if (dkim === "pass") findings.push({ t: "DKIM signature verified", c: "pass" });
  else if (dkim === "fail") { score -= 3; findings.push({ t: "DKIM failed — message may be tampered", c: "fail" }); }
  else { score -= 1; findings.push({ t: "DKIM not present", c: "warn" }); }

  if (dmarc === "pass") findings.push({ t: "DMARC policy passed", c: "pass" });
  else if (dmarc === "fail") { score -= 2; findings.push({ t: "DMARC failed — domain alignment issue", c: "fail" }); }
  else { score -= 1; findings.push({ t: "DMARC not configured", c: "warn" }); }

  if (returnPath !== "Not Found" && fromEmail !== "Not Found") {
    const rpd = (returnPath.split("@")[1] || "").toLowerCase();
    const fd = (fromEmail.split("@")[1] || "").toLowerCase();
    if (rpd && fd && rpd !== fd) { score -= 1; findings.push({ t: "Return-Path domain (" + rpd + ") differs from From domain (" + fd + ")", c: "warn" }); }
    else if (rpd && fd) findings.push({ t: "Return-Path and From domain are aligned", c: "pass" });
  }

  const sus = [/xyz$/, /\\.tk$/, /\\.ml$/, /\\.ga$/, /\\.cf$/, /free/, /temp/, /disposable/];
  if (fromDomain !== "Not Found" && sus.some(p => p.test(fromDomain.toLowerCase()))) {
    score -= 1; findings.push({ t: 'Domain "' + fromDomain + '" uses a TLD commonly associated with spam', c: "warn" });
  }

  return { score: Math.max(0, Math.min(10, score)), findings };
}

// ── Analysis ──
function runAnalysis() {
  const raw = input.value.trim();
  if (!raw) return;

  const dot = document.getElementById('statusDot');
  dot.classList.add('scanning');
  btnAnalyze.textContent = '◌ SCANNING...';
  btnAnalyze.disabled = true;

  setTimeout(() => {
    const h = parseHeaders(raw);
    const originIP = extractOriginIP(raw, h);
    const senderName = extractSenderName(h);
    const fromDomain = extractFromDomain(h);
    const fromEmail = extractFromEmail(h);
    const returnPath = extractReturnPath(h);
    const subject = extractSubject(h);
    const mailer = extractMailer(h);
    const spf = checkAuth(raw, "spf");
    const dkim = checkAuth(raw, "dkim");
    const dmarc = checkAuth(raw, "dmarc");
    const { score, findings } = computeScore(spf, dkim, dmarc, returnPath, fromEmail, fromDomain);

    let riskLabel, riskColor, riskBg;
    if (score >= 8) { riskLabel = "LOW RISK"; riskColor = "#22c55e"; riskBg = "rgba(34,197,94,0.08)"; }
    else if (score >= 5) { riskLabel = "MODERATE RISK"; riskColor = "#f59e0b"; riskBg = "rgba(245,158,11,0.08)"; }
    else { riskLabel = "HIGH RISK"; riskColor = "#ef4444"; riskBg = "rgba(239,68,68,0.08)"; }

    const circ = 2 * Math.PI * 54;
    const offset = circ * (1 - score / 10);

    const authColors = {
      pass: { bg: "rgba(34,197,94,0.1)", bd: "#22c55e33", tx: "#22c55e" },
      fail: { bg: "rgba(239,68,68,0.1)", bd: "#ef444433", tx: "#ef4444" },
      softfail: { bg: "rgba(245,158,11,0.1)", bd: "#f59e0b33", tx: "#f59e0b" },
      none: { bg: "rgba(255,255,255,0.03)", bd: "rgba(255,255,255,0.08)", tx: "rgba(255,255,255,0.3)" }
    };
    function ab(proto, status) {
      const c = authColors[status] || authColors.none;
      return '<div class="auth-badge" style="background:'+c.bg+';border:1px solid '+c.bd+'"><span class="proto">'+proto+'</span><span class="status" style="color:'+c.tx+'">'+status+'</span></div>';
    }

    function dr(label, value, isMono, isWarn) {
      return '<div class="data-row"><span class="data-label">'+label+'</span><span class="data-value'+(isMono?' mono':'')+(isWarn?' warn':'')+'">'+escHtml(value)+'</span></div>';
    }

    const findingIcons = { pass: "✓", warn: "⚠", fail: "✕" };
    let findingsHtml = findings.map(f =>
      '<div class="finding-row"><span class="finding-icon '+f.c+'">'+findingIcons[f.c]+'</span><span class="finding-text">'+escHtml(f.t)+'</span></div>'
    ).join('');

    const ts = new Date().toLocaleString();

    document.getElementById('reportContent').innerHTML = `
      <div class="card score-card fade-in">
        <div class="score-label">INTEGRITY SCORE</div>
        <svg width="140" height="140" viewBox="0 0 120 120" style="display:block;margin:0 auto">
          <circle cx="60" cy="60" r="54" class="gauge-ring-bg"/>
          <circle cx="60" cy="60" r="54" class="gauge-ring" stroke="${riskColor}"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 60 60)"/>
          <text x="60" y="55" class="gauge-score" fill="${riskColor}">${score}</text>
          <text x="60" y="72" class="gauge-max">/10</text>
        </svg>
        <div><span class="risk-badge" style="color:${riskColor};background:${riskBg};border:1px solid ${riskColor}33">${riskLabel}</span></div>
        <div class="score-time">Scanned ${escHtml(ts)}</div>
      </div>

      <div class="card fade-in">
        <div class="card-label">AUTHENTICATION PROTOCOLS</div>
        <div class="auth-row">${ab('SPF',spf)}${ab('DKIM',dkim)}${ab('DMARC',dmarc)}</div>
      </div>

      <div class="card fade-in">
        <div class="card-label">EXTRACTED MARKERS</div>
        ${dr('Origin IP', originIP, true, false)}
        ${dr('Sender Name', senderName, false, false)}
        ${dr('From Email', fromEmail, true, false)}
        ${dr('From Domain', fromDomain, true, score < 5)}
        ${dr('Return-Path', returnPath, true, false)}
        ${dr('Subject', subject, false, false)}
        ${dr('Mailer', mailer, true, false)}
      </div>

      <div class="card fade-in">
        <div class="card-label">FINDINGS</div>
        ${findingsHtml}
      </div>

      <div class="action-row">
        <button class="btn-secondary" onclick="showTab('input')">← BACK TO INPUT</button>
        <button class="btn-secondary" onclick="resetAll()">NEW SCAN</button>
      </div>

      <div class="footer-brand">SENTRY4E v1.0 — mrtechnyc.com — FREE SECURITY RESOURCE</div>
    `;

    dot.classList.remove('scanning');
    btnAnalyze.textContent = '▶ ANALYZE HEADERS';
    btnAnalyze.disabled = false;
    document.getElementById('tabReport').disabled = false;
    showTab('report');
  }, 1200);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
